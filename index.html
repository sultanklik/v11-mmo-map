<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>V11 GOD MMO MAP</title>
<style>
body{margin:0;background:#0b0b0b;color:white;font-family:Arial}
canvas{display:block;margin:auto;background:#111}
#ui{position:fixed;top:10px;left:10px;background:#1c1c1c;padding:10px;border-radius:10px}
button{margin-top:5px}
</style>
</head>

<body>

<div id="ui">
<input id="name" placeholder="Nama Player">
<button onclick="join()">JOIN WORLD</button>
<div id="status">OFFLINE</div>
</div>

<canvas id="game" width="800" height="500"></canvas>

<script type="module">

// 🔥 FIREBASE MODULE IMPORT
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getDatabase,
  ref,
  set,
  onValue,
  onDisconnect
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

// 🔥 CONFIG KAMU (SUDAH DIPAKAI)
const firebaseConfig = {
  apiKey: "AIzaSyDNQTysSwd_VNdJeDD11bTnWR5K973CeWU",
  authDomain: "sultan-mmo-v11.firebaseapp.com",
  projectId: "sultan-mmo-v11",
  storageBucket: "sultan-mmo-v11.firebasestorage.app",
  messagingSenderId: "824969622980",
  appId: "1:824969622980:web:42cd11cd300bd9a979a091",
  measurementId: "G-ERXQH8EE3Q"
};

// INIT
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getDatabase(app);

// GAME
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let myName="";
let players={};

let me={x:400,y:250};

// JOIN GAME
window.join = function(){
myName = document.getElementById("name").value;
if(!myName) return;

set(ref(db,"players/"+myName),{
name:myName,
x:me.x,
y:me.y
});

// auto remove saat disconnect
onDisconnect(ref(db,"players/"+myName)).remove();

document.getElementById("status").innerText="🟢 ONLINE";

// listen world
onValue(ref(db,"players"),(snap)=>{
players = snap.val() || {};
});
};

// MOVE PLAYER
document.addEventListener("keydown",(e)=>{
if(e.key=="w")me.y-=10;
if(e.key=="s")me.y+=10;
if(e.key=="a")me.x-=10;
if(e.key=="d")me.x+=10;

if(myName){
set(ref(db,"players/"+myName),{
name:myName,
x:me.x,
y:me.y
});
}
});

// DRAW WORLD
function draw(){

ctx.clearRect(0,0,800,500);

// grid
ctx.strokeStyle="#222";
for(let i=0;i<800;i+=50){
ctx.beginPath();
ctx.moveTo(i,0);
ctx.lineTo(i,500);
ctx.stroke();
}

// players
for(let id in players){
let p=players[id];

ctx.fillStyle = (id===myName) ? "gold" : "red";
ctx.fillRect(p.x,p.y,20,20);
ctx.fillText(p.name,p.x,p.y-5);
}

requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
