<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>V12 GOD MMO FIXED</title>

<style>
body{margin:0;background:#0b0b0b;color:white;font-family:Arial}
canvas{background:#111;display:block;margin:auto}
#ui{position:fixed;top:10px;left:10px;background:#1c1c1c;padding:10px;border-radius:10px}
button{margin-top:5px}
</style>
</head>

<body>

<div id="ui">
<input id="name" placeholder="Nama Player">
<button onclick="join()">JOIN WORLD</button>
<div id="status">OFFLINE</div>
</div>

<canvas id="game" width="800" height="500"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getDatabase,
  ref,
  set,
  onValue,
  onDisconnect
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 CONFIG FIREBASE (PASTI BENAR)
const firebaseConfig = {
  apiKey: "AIzaSyDNQTysSwd_VNdJeDD11bTnWR5K973CeWU",
  authDomain: "sultan-mmo-v11.firebaseapp.com",
  projectId: "sultan-mmo-v11",
  storageBucket: "sultan-mmo-v11.firebasestorage.app",
  messagingSenderId: "824969622980",
  appId: "1:824969622980:web:42cd11cd300bd9a979a091",
  measurementId: "G-ERXQH8EE3Q"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// GAME
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let myName="";
let players={};

let me={x:400,y:250};

let lastUpdate = 0;

// 🔥 JOIN WORLD (FIXED NO BLANK)
window.join = function(){
myName = document.getElementById("name").value;
if(!myName) return;

set(ref(db,"players/"+myName),{
name:myName,
x:me.x,
y:me.y
}).then(()=>{
document.getElementById("status").innerText="🟢 ONLINE";
});

// realtime listener (WAJIB 1x saja)
onValue(ref(db,"players"),(snap)=>{
players = snap.val() || {};
});
};

// 🔥 THROTTLED UPDATE (ANTI SPAM FIREBASE)
function updateServer(){
if(!myName) return;

let now = Date.now();
if(now - lastUpdate < 200) return; // anti spam
lastUpdate = now;

set(ref(db,"players/"+myName),{
name:myName,
x:me.x,
y:me.y
});
}

// 🔥 MOVEMENT
document.addEventListener("keydown",(e)=>{
if(e.key=="w")me.y-=10;
if(e.key=="s")me.y+=10;
if(e.key=="a")me.x-=10;
if(e.key=="d")me.x+=10;

updateServer();
});

// 🔥 DRAW WORLD
function draw(){

ctx.clearRect(0,0,800,500);

// GRID
ctx.strokeStyle="#222";
for(let i=0;i<800;i+=50){
ctx.beginPath();
ctx.moveTo(i,0);
ctx.lineTo(i,500);
ctx.stroke();
}

// PLAYERS
for(let id in players){
let p = players[id];

if(!p) continue;

ctx.fillStyle = (p.name === myName) ? "gold" : "red";
ctx.fillRect(p.x,p.y,20,20);
ctx.fillText(p.name,p.x,p.y-5);
}

// DEBUG
console.log("players:", players);

requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
